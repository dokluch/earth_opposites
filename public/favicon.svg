<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="ocean" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </radialGradient>
  </defs>
  <!-- Globe -->
  <circle cx="16" cy="16" r="14.5" fill="url(#ocean)" stroke="#3a6a5c" stroke-width="0.8"/>
  <!-- Meridians -->
  <ellipse cx="16" cy="16" rx="5" ry="14" fill="none" stroke="#2d5a4a" stroke-width="0.6" opacity="0.5"/>
  <ellipse cx="16" cy="16" rx="10" ry="14" fill="none" stroke="#2d5a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Equator -->
  <ellipse cx="16" cy="16" rx="14" ry="4" fill="none" stroke="#2d5a4a" stroke-width="0.6" opacity="0.5"/>
  <!-- Point A (green) -->
  <circle cx="11" cy="11" r="2.5" fill="#4dcc80" opacity="0.95"/>
  <circle cx="11" cy="11" r="4" fill="none" stroke="#4dcc80" stroke-width="0.7" opacity="0.4"/>
  <!-- Point B (coral) -->
  <circle cx="21" cy="21" r="2.5" fill="#e06040" opacity="0.95"/>
  <circle cx="21" cy="21" r="4" fill="none" stroke="#e06040" stroke-width="0.7" opacity="0.4"/>
  <!-- Connecting line -->
  <line x1="11" y1="11" x2="21" y2="21" stroke="#d4a040" stroke-width="0.8" stroke-dasharray="1.5 1.5" opacity="0.6"/>
</svg>